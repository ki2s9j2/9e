            <!-- Button hidden until drawing finishes -->
            <button id="continueBtn" style="display:none; padding: 12px 30px; font-size: 20px; font-weight: bold; font-family: 'Quicksand', sans-serif; border-radius: 30px; background: linear-gradient(135deg, #ff4d6d, #ff758f); color: white; border: 2px solid white; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4); z-index: 20;">MỞ QUÀ 8/3 NÀO!</button>
        </div>

    <!-- PHASE 2: ENVELOPE (gift_letterv2 style) -->
    <div id="phase2">
        <div class="envelope-wrapper" id="envWrap">
            <div class="envelope2">
                <div class="env-flower fl1">🌸</div>
                <div class="env-flower fl2">🌷</div>
                <div class="env-letter">
                    <div id="giftSection" class="gift-section" style="text-align:center; padding: 10px 0; opacity:0; visibility:hidden; transition: all 0.5s ease;">
                        <span style="display:block; font-family:'Quicksand', sans-serif; font-size: 14px; color: #d81b60; margin-bottom: 5px; font-weight: bold;">✨ Bấm vào đây sẽ có bất ngờ nè ✨</span>
                        <button class="gift-btn show" id="giftBtn" style="position:relative; transform:none; left:auto; margin:0 auto; display:inline-block; pointer-events:auto;">🎁</button>
                    </div>
                    <div id="text" class="text"></div>
                </div>
            </div>
            <div class="seal" id="seal">💖</div>
        </div>
        <div class="phase2-hint">Chạm vào 💖 để mở thư từ lớp nhé</div>
    </div>


    <button class="music-btn" id="musicBtn">🎵</button>
    <audio id="bgMusic" loop preload="auto">
        <source src="./bg-music.mp3" type="audio/mpeg">
    </audio>

    <!-- PHASE 3: LUCKY WHEEL -->
    <div id="phase3" class="hidden">
      <button id="finishBtn">Kết Thúc Sớm</button>
      <div class="wheel-wrapper">
          <div class="wheel-pointer"></div>
          <canvas id="wheelCanvas" width="500" height="500"></canvas>
          <button id="spinBtn" class="spin-btn">QUAY<br>THƯỞNG</button>
      </div>
      <div class="wheel-hint">Nhấn nút để quay tên nhé! Vòng quay của lớp mình đoá ❤️</div>
    </div>
    
    <!-- PHASE 4: CELEBRATION -->
    <div id="phase4" class="hidden">
        <h1 id="celebrationName"></h1>
        <div id="photoGallery" class="photo-gallery"></div>
        <div id="heartsContainer"></div>
    </div>

    <!-- CREATOR MODE REMOVED -->

    <!-- JS Scripts -->
    <!-- Anime.js & Main Script -->
